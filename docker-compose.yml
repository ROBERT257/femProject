services:
  db:
    container_name: "workoutDB"
    image: postgres:12.4-alpine
    volumes:
      - "./database:/var/lib/postgresql/data:rw"
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "postgres"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    restart: unless-stopped

  api:
    container_name: "femproject-api"
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_URL: "postgres://postgres:postgres@db:5432/postgres?sslmode=disable"
      SMTP_HOST: "mailhog"
      SMTP_PORT: "1025"
      SMTP_FROM: "no-reply@rehabtrack.local"
      OLLAMA_URL: "http://host.docker.internal:11434"
      OLLAMA_MODEL: "phi3"
      SERVER_PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: unless-stopped

  mailhog:
    container_name: "rehabtrack-mailhog"
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped
